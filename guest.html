<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guest List</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0b0b0b;
font-family:Poppins;
color:white;
}

.container{
text-align:center;
width:90%;
max-width:500px;
}

.title{
font-family:'Great Vibes',cursive;
font-size:64px;
color:gold;
margin-bottom:25px;
}

.search{
width:100%;
padding:16px;
border-radius:40px;
border:none;
outline:none;
font-size:16px;
text-align:center;
transition:0.3s;
}

.search:focus{
transform:scale(1.02);
}

.results{
margin-top:20px;
}

.result{
background:#1a1a1a;
padding:12px 16px;
margin:8px 0;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fade 0.3s ease;
}

.result button{
background:gold;
border:none;
padding:6px 16px;
border-radius:20px;
font-weight:500;
cursor:pointer;
}

.result button:hover{
background:#ffd700;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

.cardOverlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
flex-direction:column;
}

.inviteCard{
background:black;
border:3px solid gold;
border-radius:22px;
padding:40px 30px;
width:320px;
text-align:center;
color:gold;
}

.inviteTitle{
font-family:'Great Vibes';
font-size:40px;
margin-bottom:30px;
}

.guestName{
font-size:26px;
margin-top:10px;
}

.place{
margin-top:25px;
font-size:15px;
}

.download{
margin-top:20px;
padding:10px 22px;
background:gold;
border:none;
border-radius:30px;
font-weight:600;
cursor:pointer;
}

.close{
margin-top:10px;
background:none;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Guest List</div>

<input id="search" class="search" placeholder="Search your name">

<div id="results" class="results"></div>

</div>


<div class="cardOverlay" id="cardOverlay">

<div id="inviteCard" class="inviteCard">

<div class="inviteTitle">You Are Cordially Invited</div>

<div id="guestName" class="guestName"></div>

<div class="place">
Glorious Praise Event Center<br>
Rumibekwe, 34 Nembe Road<br>
Obia, Port Harcourt
</div>

</div>

<button class="download" onclick="downloadCard()">Download Invitation</button>

<button class="close" onclick="closeCard()">Close</button>

</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>


// ADD YOUR 100 NAMES HERE

const searchInput=document.getElementById("search");
const results=document.getElementById("results");


searchInput.addEventListener("input",function(){

const value=this.value.toLowerCase().trim();

results.innerHTML="";

if(value==="") return;


const matches=guests.filter(name =>
name.toLowerCase().includes(value)
);


matches.forEach(name=>{

const div=document.createElement("div");
div.className="result";

div.innerHTML=`
<span>${name}</span>
<button onclick="showInvite('${name}')">View</button>
`;

results.appendChild(div);

});

});


function showInvite(name){

document.getElementById("guestName").innerText=name;

document.getElementById("cardOverlay").style.display="flex";

}


function closeCard(){

document.getElementById("cardOverlay").style.display="none";

}


function downloadCard(){

html2canvas(document.getElementById("inviteCard")).then(canvas=>{

const link=document.createElement("a");

link.download="invitation.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

</body>
</html>
